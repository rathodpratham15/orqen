# Nixpacks build configuration for Railway
# Docs: https://nixpacks.com/docs/configuration/file

[phases.setup]
# libpq for psycopg2; gcc/libffi for some Python packages
nixPkgs = ["libpq", "gcc", "libffi", "openssl"]

[phases.install]
# Use the slim requirements file that excludes PyTorch/sentence-transformers
# (too large for Railway free tier; MemoryNode falls back gracefully)
cmds = ["pip install --upgrade pip", "pip install -r requirements-deploy.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
