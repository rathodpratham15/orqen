version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Orqen — full local stack
#
# Usage:
#   docker compose up            → start all services
#   docker compose up backend    → backend only (for fast iteration)
#   docker compose run --rm migrate → run Alembic migrations once
#
# Services use the managed cloud databases (Neon + Upstash) from .env by default.
# Override DATABASE_URL / REDIS_URL to use the local postgres/redis instead.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Local postgres (only needed if not using Neon) ──────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: orqen
      POSTGRES_PASSWORD: orqen
      POSTGRES_DB: orqen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orqen"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Local redis (only needed if not using Upstash) ──────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Run Alembic migrations (one-shot) ───────────────────────────────────────
  migrate:
    build: ./backend
    env_file: ./backend/.env
    command: alembic upgrade head
    profiles: ["migrate"]

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app          # hot-reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A workers worker --loglevel=info --concurrency=2 -Q workflows,default

  # ── Celery Beat (cron scheduler) ────────────────────────────────────────────
  beat:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    command: celery -A workers beat --loglevel=info

  # ── Flower (Celery monitoring UI at :5555) ───────────────────────────────────
  flower:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    command: celery -A workers flower --port=5555

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
