# Railway deployment configuration
# Docs: https://docs.railway.com/reference/config-as-code
#
# IMPORTANT: In the Railway dashboard, set "Root Directory" = backend
# for the backend/worker services. Nixpacks will auto-detect Python
# and install requirements-deploy.txt from that directory.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
