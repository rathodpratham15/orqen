# Railway deployment configuration
# Docs: https://docs.railway.com/reference/config-as-code
#
# No "Root Directory" setting needed — nixpacks.toml at the project root
# handles install (from backend/requirements-deploy.txt) and start (cd backend).

[build]
builder = "NIXPACKS"

[deploy]
# cd backend so uvicorn can resolve imports relative to that directory
startCommand = "cd backend && bash start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
