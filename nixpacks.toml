# Root-level Nixpacks config — Railway uses project root as build context
# No "Root Directory" setting needed in the Railway dashboard.
#
# No [phases.setup] override: let Nixpacks auto-detect Python and install it.
# All packages in requirements-deploy.txt use binary wheels, so no system libs
# (libpq-dev, gcc, etc.) are needed at build time.

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements-deploy.txt",
]

[start]
# cd backend so uvicorn resolves main:app and all its imports correctly
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
