# Root-level Nixpacks config — Railway uses project root as build context.
# No "Root Directory" setting needed in the Railway dashboard.
#
# Python auto-detection: Nixpacks detects Python from the root requirements.txt
# (which includes backend/requirements-deploy.txt). No [phases.setup] or
# [phases.install] override needed — Nixpacks auto-runs pip install -r requirements.txt.

[start]
# cd backend so uvicorn resolves main:app and all relative imports correctly
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
